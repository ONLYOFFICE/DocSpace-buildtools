name: Install OneClickInstall Docker

on:
  workflow_dispatch:
    inputs:
      offline:
        description: 'Publish 4testing offline archive'
        required: true
        default: false
        type: boolean
      install_type:
        description: 'Installation type (ee, de, ce, or all)'
        required: true
        default: 'all'
        type: choice
        options:
          - ee
          - de
          - ce
          - all

jobs:
  Install-OneClickInstall-Docker:
    runs-on: ubuntu-22.04
    steps:
      - name: Free Disk Space
        run: |
          sudo docker image prune --all --force

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Test OCI docker scripts
        run: |
          wget https://raw.githubusercontent.com/ONLYOFFICE/docspace-buildtools/${{ github.ref_name }}/install/OneClickInstall/install-Docker.sh
          sed -i "1i set -x" install-Docker.sh && sed -i "/docker-compose.*up -d/ s/$/ --quiet-pull/" install-Docker.sh

          # Define installation types to process
          if [ "${{ github.event.inputs.install_type }}" = "all" ]; then
            INSTALL_TYPES=("ee" "de" "ce")
          else
            INSTALL_TYPES=("${{ github.event.inputs.install_type }}")
          fi

          for type in "${INSTALL_TYPES[@]}"; do
            case $type in
              ee) IMAGE="onlyoffice/documentserver-ee" ;;
              de) IMAGE="onlyoffice/documentserver-de" ;;
              ce) IMAGE="onlyoffice/documentserver" ;;
            esac
            echo "Testing installation for $type ($IMAGE)"
            sudo bash install-Docker.sh -skiphc true -noni true $([ ${{ github.ref_name }} != "master" ] && echo "-gb ${{ github.ref_name }} -s 4testing-") -it $type || exit $?
            
            echo -n "Waiting for all containers to start for $type..."
            timeout 300 bash -c 'while docker ps | grep -q "starting"; do sleep 5; done' && echo "OK" || echo "container_status=timeout" >> $GITHUB_ENV
          done

      - name: Check container status
        run: |
          SERVICES=(dashboards db docspace ds fluent healthchecks identity notify opensearch proxy rabbitmq redis)
          for SERVICE in "${SERVICES[@]}"; do YML_ARGS+=( -f "/app/onlyoffice/${SERVICE}.yml" ); done
          for SVC in $(docker compose "${YML_ARGS[@]}" config --services); do
            docker compose "${YML_ARGS[@]}" ps "$SVC" | grep -q ${SVC} || { echo "::error::$SVC was not created"; MISSING_COUNT=$((MISSING_COUNT+1)); }
          done; [ "${MISSING_COUNT:=0}" -gt 0 ] && { echo "::error::$MISSING_COUNT service(s) were not created."; exit 1; }

          docker ps --all --format "{{.Names}}" | xargs -I {} sh -c '
              status=$(docker inspect --format="{{if .State.Health}}{{.State.Health.Status}}{{else}}no healthcheck{{end}}" {});
              case "$status" in
                healthy) color="\033[0;32m" ;;                                        # green
                "no healthcheck") color="\033[0;33m" ;;                               # yellow
                *) color="\033[0;31m"; echo "container_status=red" >> $GITHUB_ENV ;;  # red
              esac;
              printf "%-50s ${color}%s\033[0m\n" "{}:" "$status";
          '

      - name: Print logs for crashed container
        run: |
          docker ps --all --format "{{.Names}}" | xargs -I {} sh -c '
              status=$(docker inspect --format="{{if .State.Health}}{{.State.Health.Status}}{{else}}no healthcheck{{end}}" {});
              case "$status" in
                healthy | "no healthcheck") ;;
                *)
                  echo "Logs for container {}:";
                  docker logs --tail 30 {} | sed "s/^/\t/g";
                  ;;
              esac;
          '
          case "${{ env.container_status }}" in
              timeout) echo "::error:: Timeout reached. Not all containers are running."; exit 1 ;;
              red) echo "::error:: One or more containers have status 'red'. Job will fail."; exit 1 ;;
          esac

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Free Disk Space
        if: ${{ success() && github.event.inputs.offline == 'true' }}
        run: |
          docker stop $(docker ps -a -q) && docker rm $(docker ps -a -q) && docker volume rm $(docker volume ls -q)
          curl -fsSL https://raw.githubusercontent.com/apache/arrow/refs/heads/main/ci/scripts/util_free_space.sh | sudo bash

      - name: Creating 4testing offline self-extracting archive
        if: ${{ success() && github.event.inputs.offline == 'true' }}
        run: |
          INSTALL_PATH=${{ github.workspace }}/install

          # Define installation types to process
          if [ "${{ github.event.inputs.install_type }}" = "all" ]; then
            INSTALL_TYPES=("ee" "de" "ce")
          else
            INSTALL_TYPES=("${{ github.event.inputs.install_type }}")
          fi

          for type in "${INSTALL_TYPES[@]}"; do
            case $type in
              ee) IMAGE="onlyoffice/documentserver-ee" ;;
              de) IMAGE="onlyoffice/documentserver-de" ;;
              ce) IMAGE="onlyoffice/documentserver" ;;
            esac

            echo "Processing images for $type"
            docker images --format "{{.Repository}}:{{.Tag}}" | grep "${IMAGE}" | xargs -I{} bash -c '
              docker tag "$1" $(echo "${1/4testing-/}" | sed -E "s/([0-9]+\.[0-9]+\.[0-9]+)\.[0-9]+/\1/")
              docker rmi "$1"
            ' _ {}

            sed -i 's~\(OFFLINE_INSTALLATION="\|SKIP_HARDWARE_CHECK="\).*"$~\1true"~' "${INSTALL_PATH}/OneClickInstall/install-Docker.sh"

            echo "Creating offline self-extracting archive for $type..."
            docker save $(docker images --format "{{.Repository}}:{{.Tag}}" | grep -E "${IMAGE}|onlyoffice/docspace") | xz --verbose -T0 -z -9e > ${INSTALL_PATH}/docker_images_${type}.tar.xz
            cd ${INSTALL_PATH}/docker && tar -czvf ${INSTALL_PATH}/docker_${type}.tar.gz --exclude='config/supervisor*' *.yml .env config/

            tar -cvf ${INSTALL_PATH}/offline-docspace_${type}.tar \
              -C "${INSTALL_PATH}/OneClickInstall" install-Docker.sh install-Docker-args.sh \
              -C "${INSTALL_PATH}" docker_images_${type}.tar.xz \
              -C "${INSTALL_PATH}" docker_${type}.tar.gz
            rm -rf ${INSTALL_PATH}/docker_images_${type}.tar.xz ${INSTALL_PATH}/docker_${type}.tar.gz

            echo "ARTIFACT_NAME_${type}=4testing-offline-docspace-installation-${type}.sh" >> $GITHUB_ENV
            cat ${INSTALL_PATH}/common/self-extracting.sh ${INSTALL_PATH}/offline-docspace_${type}.tar > ${INSTALL_PATH}/4testing-offline-docspace-installation-${type}.sh
            chmod +x ${INSTALL_PATH}/4testing-offline-docspace-installation-${type}.sh
          done

      - name: Configure AWS Credentials
        if: ${{ success() && github.event.inputs.offline == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_OCI }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_OCI }}
          aws-region: us-east-1

      - name: Upload 4testing offline self-extracting archive
        if: ${{ success() && github.event.inputs.offline == 'true' }}
        run: |
          if [ "${{ github.event.inputs.install_type }}" = "all" ]; then
            INSTALL_TYPES=("ee" "de" "ce")
          else
            INSTALL_TYPES=("${{ github.event.inputs.install_type }}")
          fi

          for type in "${INSTALL_TYPES[@]}"; do
            aws s3 cp ${{ github.workspace }}/install/4testing-offline-docspace-installation-${type}.sh \
              ${{ secrets.AWS_BUCKET_URL_OCI }}/4testing-offline-docspace-installation-${type}.sh \
              --acl public-read \
              --content-type application/x-xz \
              --metadata-directive REPLACE
            aws cloudfront create-invalidation \
              --distribution-id ${{ secrets.AWS_DISTRIBUTION_ID_OCI }} \
              --paths "/docspace/4testing-offline-docspace-installation-${type}.sh"
          done

