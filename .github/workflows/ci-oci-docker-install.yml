name: OCI Docker

on:
  schedule:
    - cron: "00 20 * * 0"
  push:
    branches:
      - "hotfix/**"
      - "release/**"
      - "develop"
    paths:
      - ".github/workflows/ci-oci-docker-install.yml"
      - "install/OneClickInstall/install-Docker.sh"
      - "install/docker/*.yml"
      - "install/docker/community/docker-compose.yml"
  workflow_dispatch:
    inputs:
      testing:
        description: "Use 4testing images"
        required: true
        default: true
        type: boolean
      offline:
        description: "Publish 4testing offline archive"
        required: true
        default: false
        type: boolean
      tag:
        description: "Docker tag (optional)"
        required: false
        default: ''
        type: string

env:
  IS_4TESTING: ${{ github.event.inputs.testing }}
  DOCKER_TAG: ${{ github.event.inputs.tag }}

jobs:
  Setup:
    runs-on: ubuntu-latest
    outputs:
      modes: ${{ steps.modes.outputs.value }}
    steps:
      - id: modes
        name: Configure matrix modes
        run: |
          STACK=$(jq -cn '{name:"stack", services:"docspace-stack dashboards db ds fluent opensearch proxy rabbitmq redis ", args:"-sm true"}')
          STANDARD=$(jq -cn '{name:"standard", services:"docspace healthchecks identity notify dashboards db ds fluent opensearch proxy rabbitmq redis", args:""}')

          VALUE=$([ "${{ github.event.inputs.offline }}" = "true" ] \
            && echo "[$STACK]" \
            || jq -cn --argjson a "$STANDARD" --argjson b "$STACK" '[$a,$b]')
          echo "value=$VALUE" >> "$GITHUB_OUTPUT"

  Install-OCI-Docker:
    needs: Setup
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        mode: ${{ fromJSON(needs.Setup.outputs.modes) }}
        include:
          - runner: ubuntu-24.04
            arch: amd
          - runner: ubuntu-24.04-arm
            arch: arm
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
    name: OCI (${{ matrix.mode.name }}) [${{ matrix.arch }}]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Free Disk Space
        run: sudo bash .github/scripts/free-disk-space-linux.sh

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Test OCI docker scripts
        env:
          DOCKERHUB_USERNAME_PAT: ${{ secrets.DOCKERHUB_USERNAME_PAT }}
          DOCKERHUB_TOKEN_PAT: ${{ secrets.DOCKERHUB_TOKEN_PAT }}
        run: bash .github/scripts/docker-utils.sh test-install "${{ matrix.mode.args }}"

      - name: Check container status
        run: |
          bash .github/scripts/docker-utils.sh check-services "${{ matrix.mode.services }}"
          bash .github/scripts/docker-utils.sh status

      - name: Smoke test
        timeout-minutes: 20
        env:
          LICENSE: ${{ secrets.LICENSE_ENTERPRISE }}
        run: bash .github/scripts/docker-utils.sh smoke-test

      - name: Print logs for crashed containers
        run: bash .github/scripts/docker-utils.sh logs 30

      - name: Check Docker scripts for errors
        if: matrix.mode.name == 'stack' && matrix.runner == 'ubuntu-24.04'
        run: bash .github/scripts/docker-utils.sh shellcheck

      - name: Prepare offline environment
        if: success() && github.event.inputs.offline == 'true'
        run: bash .github/scripts/offline-archive.sh prepare

      - name: Create compressed archives
        if: success() && github.event.inputs.offline == 'true'
        run: bash .github/scripts/offline-archive.sh create ${{ matrix.arch }}

      - name: Build self-extracting archive
        if: success() && github.event.inputs.offline == 'true'
        run: bash .github/scripts/offline-archive.sh build ${{ matrix.arch }}

      - name: Configure AWS Credentials
        if: success() && github.event.inputs.offline == 'true'
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_OCI }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_OCI }}
          aws-region: us-east-1

      - name: Upload 4testing offline self-extracting archive
        if: success() && github.event.inputs.offline == 'true'
        env:
          AWS_BUCKET_URL_OCI: ${{ secrets.AWS_BUCKET_URL_OCI }}
          AWS_REST_API_ID: ${{ secrets.AWS_REST_API_ID }}
          AWS_RESOURCE_ID: ${{ secrets.AWS_RESOURCE_ID }}
        run: bash .github/scripts/offline-archive.sh upload

  Install-Community:
    if: github.event.inputs.offline != 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd
          - runner: ubuntu-24.04-arm
            arch: arm
    name: Community [${{ matrix.arch }}]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Free Disk Space
        run: sudo bash .github/scripts/free-disk-space-linux.sh

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Start community
        working-directory: install/docker/community
        env:
          DOCKERHUB_USERNAME_PAT: ${{ secrets.DOCKERHUB_USERNAME_PAT }}
          DOCKERHUB_TOKEN_PAT: ${{ secrets.DOCKERHUB_TOKEN_PAT }}
        run: bash "$GITHUB_WORKSPACE/.github/scripts/docker-utils.sh" start-community

      - name: Check container status
        run: bash .github/scripts/docker-utils.sh status

      - name: Smoke test
        timeout-minutes: 20
        run: bash .github/scripts/docker-utils.sh smoke-test

      - name: Print logs for crashed containers
        if: always()
        run: bash .github/scripts/docker-utils.sh logs 50
