name: "<reusable> Release Docker images"

on:
  workflow_call:
    inputs:
      repo:
        type: string
        required: true
        description: 'hub.docker repo owner (ex. onlyoffice)'
      release_version:
        type: string
        required: true
        description: 'Tag for stable release (ex. 1.0.0.1)'
      source_version:
        type: string
        required: true
        description: '4testing tag from which the release will be created (ex. 2.5.1.5678)'
    secrets:
      docker-username:
        required: true
        description: "hub.docker username (used for image push)"
      docker-usertoken:
        required: true
        description: "hub.docker token (used for image push)"
      docker-username-pat:
        required: false
        description: "hub.docker PAT username (used only for management API)"
      docker-usertoken-pat:
        required: false
        description: "hub.docker PAT token (used only for management API)"

jobs:
  Release:
    name: "Release Docker-DocSpace"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with: 
        repository: 'ONLYOFFICE/DocSpace-buildtools'

    - name: Login to DockerHub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.docker-username }}
        password: ${{ secrets.docker-usertoken }}
           
    - name: "Release Docker-DocSpace"
      shell: bash
      env:
        REPO: ${{ inputs.repo }}
        DOCKER_TAG: ${{ inputs.source_version }}
        RELEASE_VERSION: ${{ inputs.release_version }}
        DOCKER_IMAGE_PREFIX: "4testing-docspace"
        DOCKER_USERNAME_PAT: ${{ secrets.docker-username-pat }}
        DOCKER_TOKEN_PAT: ${{ secrets.docker-usertoken-pat }}
      run: |
         chmod +x ${GITHUB_WORKSPACE}/.github/scripts/release-docspace.sh
         ${GITHUB_WORKSPACE}/.github/scripts/release-docspace.sh
