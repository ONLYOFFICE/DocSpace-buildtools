name: OCI ARM Packages

on:
  schedule:
    - cron: "30 21 * * 0"
  push:
    branches:
      - "feature/**"
      - "hotfix/**"
      - "release/**"
      - "develop"
    paths:
      - ".github/workflows/ci-oci-package-arm.yml"
      - "install/OneClickInstall/**"
  pull_request:
    branches:
      - "develop"
      - "release/**"
      - "hotfix/**"
    paths:
      - ".github/workflows/ci-oci-package-arm.yml"
      - "install/OneClickInstall/**"
  workflow_dispatch:
    inputs:
      product_version:
        description: "DocSpace package version (optional)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  deb-ubuntu2404-arm64:
    name: DEB Ubuntu 24.04 arm64 package install
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    env:
      PRODUCT_VERSION: ${{ github.event.inputs.product_version }}

    steps:
      - name: Free Disk Space
        run: curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/${{ github.ref_name }}/.github/scripts/free-disk-space-linux.sh | sudo bash

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Show upstream ARM package metadata
        run: |
          set -euo pipefail

          show_architectures() {
            local name="$1"
            local url="$2"

            echo "::group::${name}"
            echo "Source: ${url}"
            curl -fsSL "${url}" | grep -E '^(Architectures|Components|Codename|Suite):' || true
            echo "::endgroup::"
          }

          show_architectures "OpenResty Ubuntu noble arm64" "https://openresty.org/package/arm64/ubuntu/dists/noble/Release"
          show_architectures "Oracle MySQL Ubuntu noble" "https://repo.mysql.com/apt/ubuntu/dists/noble/Release"

          echo "::group::Oracle MySQL 8.4 LTS Ubuntu noble indexes"
          echo "Source: https://repo.mysql.com/apt/ubuntu/dists/noble/mysql-8.4-lts/"
          curl -fsSL "https://repo.mysql.com/apt/ubuntu/dists/noble/mysql-8.4-lts/" | grep -E 'binary-' || true
          echo "::endgroup::"

      - name: Install DocSpace DEB package on ARM
        run: |
          set -eux
          cd install/OneClickInstall

          args=(
            package
            --localscripts true
            --skiphardwarecheck true
            --makeswap false
            --installfluentbit false
            --installationtype community
            --logging false
          )
          [ -n "${PRODUCT_VERSION}" ] && args+=(--docspaceversion "${PRODUCT_VERSION}")

          sudo -E bash docspace-install.sh "${args[@]}"

      - name: Verify DEB installation
        run: |
          set -eux
          dpkg -s docspace docspace-proxy onlyoffice-documentserver
          systemctl --no-pager --failed || true
          for service in mysql rabbitmq-server redis-server opensearch openresty; do
            systemctl is-active "$service"
          done

      - name: Collect ARM package logs
        if: failure()
        run: |
          systemctl --no-pager --failed || true
          systemctl --no-pager status mysql rabbitmq-server redis-server opensearch openresty "docspace*" || true
          journalctl --no-pager -n 500 || true
          dpkg -l | grep -E "docspace|onlyoffice|documentserver|rabbitmq|erlang|mysql|openresty|opensearch|redis" || true
