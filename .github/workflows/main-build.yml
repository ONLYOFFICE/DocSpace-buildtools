name: 4testing multiarch-build

on:
  workflow_dispatch:
    inputs:
      branches:
        description: 'Branches for multiarch build (JSON array)'
        required: false
        type: string

  repository_dispatch:
    types:
      - cron-trigger-action
      - config-trigger-action
      - client-trigger-action
      - server-trigger-action

env:
  DOCKER_PATH: "/install/docker"
  REPO: "onlyoffice"
  DOCKER_IMAGE_PREFIX: "4testing-docspace"
  DOCKERFILE: "Dockerfile.app"

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.compute.outputs.tags }}
      versions: ${{ steps.compute.outputs.versions }}
    steps:
      - id: compute
        run: |
          VERSIONS=$(echo '${{ github.event.client_payload.branches || inputs.branches }}' | jq -c '
            [.[] | {key: ., value: (gsub("^(release|hotfix|feature|bugfix).*/"; "") | gsub("-git-action$"; "") | ltrimstr("v"))}] | from_entries
          ')
          TAGS=$(echo "$VERSIONS" | jq -c 'with_entries(.value += ".${{ github.run_number }}")')
          echo "versions=$VERSIONS" >> $GITHUB_OUTPUT
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

  build:
    name: ${{ matrix.service }} (${{ matrix.branch }})
    needs: prepare
    runs-on: ubuntu-latest
    env:
      DOCKER_TAG: ${{ fromJson(needs.prepare.outputs.tags)[matrix.branch] }}
      PRODUCT_VERSION: ${{ fromJson(needs.prepare.outputs.versions)[matrix.branch] }}
    strategy:
      matrix:
        branch: ${{ github.event.client_payload.branches || fromJson(inputs.branches) }}
        service: [dotnet, node, java]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ matrix.branch }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup BuildKit with /mnt support
        run: |
          docker rm -f buildkitd || true
          mountpoint -q /mnt && { sudo mkdir -p /mnt/buildkit; sudo chmod 777 /mnt/buildkit; STORAGE_ARGS="-v /mnt/buildkit:/var/lib/buildkit"; } || STORAGE_ARGS=""
          docker run -d --name buildkitd --privileged --network host ${STORAGE_ARGS} moby/buildkit:buildx-stable-1 --addr tcp://0.0.0.0:1234 --allow-insecure-entitlement security.insecure --allow-insecure-entitlement network.host
          docker buildx create --name builder --driver remote tcp://127.0.0.1:1234 --use
          docker buildx inspect --bootstrap

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build ${{ matrix.service }}
        timeout-minutes: 90
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd .${DOCKER_PATH}
          docker buildx bake -f build.hcl ${{ matrix.service }}-services \
            --set "*.args.GIT_BRANCH=${{ matrix.branch }}" \
            --set "*.args.PRODUCT_VERSION=${{ env.PRODUCT_VERSION }}" \
            --set "*.args.BUILD_NUMBER=${{ github.run_number }}" \
            --set "*.platform=linux/amd64,linux/arm64" \
            --set "*.secrets=id=github_token,env=GITHUB_TOKEN" \
            --sbom=true --provenance=mode=max --push
          
          # Clean up disk space after build
          printf '%.0s=' {1..80}; echo -e "\nDISK SPACE AFTER BUILD $(echo ${{ matrix.service }} | tr '[:lower:]' '[:upper:]')"; df -h; docker system df; printf '%.0s=' {1..80}; echo
          docker buildx prune -a -f; docker system prune -a -f --volumes

  trigger-oci-docker:
    name: OCI (${{ matrix.branch }})
    needs: [build, prepare]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      DOCKER_TAG: ${{ fromJson(needs.prepare.outputs.tags)[matrix.branch] }}
    strategy:
      matrix:
        branch: ${{ github.event.client_payload.branches || fromJson(inputs.branches) }}
    steps:
      - name: Checkout ${{ matrix.branch }}
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - name: Process branch ${{ matrix.branch }}
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME_PAT }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN_PAT }}
        run: |
          sudo GITHUB_REPOSITORY=${{ github.repository }} BRANCH=${{ matrix.branch }} \
            DOCKER_REPOSITORY=${{ env.REPO }} DOCKER_PREFIX=${{ env.DOCKER_IMAGE_PREFIX }} DOCKER_TAG=$DOCKER_TAG \
            DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME} DOCKERHUB_TOKEN=${DOCKERHUB_TOKEN} \
            bash .github/scripts/docker-images-availability.sh

          gh workflow run "ci-oci-docker-install.yml" --repo "${{ github.repository }}" --ref "${{ matrix.branch }}" --field offline=false --field testing=true --field tag=$DOCKER_TAG

  grype-scan:
    name: Grype (${{ matrix.branch }})
    needs: [build, prepare]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      DOCKER_TAG: ${{ fromJson(needs.prepare.outputs.tags)[matrix.branch] }}
    strategy:
      fail-fast: false
      matrix:
        branch: ${{ github.event.client_payload.branches || fromJson(inputs.branches) }}
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Scan aggregate images
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://get.anchore.io/grype | sudo sh -s -- -b /usr/local/bin

          SUMMARY=""; TOTAL=0
          JQ_COUNTS='[.matches[]?.vulnerability.severity | select(.=="Critical" or .=="High")] | {critical: (map(select(.=="Critical")) | length), high: (map(select(.=="High")) | length)} | "\(.critical) \(.high)"'
          JQ_TABLE='["PACKAGE","INSTALLED","FIXED-IN","TYPE","VULNERABILITY","SEVERITY"],
            (.matches[]? | select(.vulnerability.severity | . == "High" or . == "Critical")
            | [.artifact.name, .artifact.version, (.vulnerability.fix.versions[0] // "-"),
               .artifact.type, .vulnerability.id, .vulnerability.severity]) | @tsv'

          for SERVICE in dotnet node java; do
            REPORT=$(grype "registry:${REPO}/${DOCKER_IMAGE_PREFIX}-${SERVICE}:${DOCKER_TAG}" --output json)
            read -r CRITICAL HIGH <<< "$(jq -r "$JQ_COUNTS" <<< "$REPORT")"
            COUNT=$((CRITICAL + HIGH)); TOTAL=$((TOTAL + COUNT))
            SUMMARY+="${SUMMARY:+ | }${SERVICE}: $([ "$COUNT" -gt 0 ] && echo "${CRITICAL}C/${HIGH}H" || echo ok)"
            ICON=$([ "$CRITICAL" -gt 0 ] && echo "🔴" || { [ "$HIGH" -gt 0 ] && echo "🟠" || echo "✅"; })
            echo "::group::${ICON} ${SERVICE} — 🔴 critical: ${CRITICAL}, 🟠 high: ${HIGH}"
            jq -r "$JQ_TABLE" <<< "$REPORT" | column -t -s $'\t'
            echo "::endgroup::"
          done

          echo "$([ "$TOTAL" -gt 0 ] && echo "::warning" || echo "::notice") title=Grype [${{ matrix.branch }}]::${SUMMARY}"
