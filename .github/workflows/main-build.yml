name: 4testing multiarch-build

on:
  workflow_dispatch:
    inputs:
      branches:
        description: 'Branches for multiarch build (JSON array)'
        required: false
        type: string

  repository_dispatch:
    types:
      - cron-trigger-action
      - config-trigger-action
      - client-trigger-action
      - server-trigger-action

env:
  DOCKER_PATH: "/install/docker"
  REPO: "onlyoffice"
  DOCKER_IMAGE_PREFIX: "4testing-docspace"
  DOCKERFILE: "Dockerfile.app"

jobs:
  build:
    name: ${{ matrix.service }} (${{ matrix.branch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: ${{ github.event.client_payload.branches || fromJson(inputs.branches) }}
        service: [dotnet, node, java]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.branch }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup BuildKit with /mnt support
        run: |
          docker rm -f buildkitd || true
          mountpoint -q /mnt && { sudo mkdir -p /mnt/buildkit; sudo chmod 777 /mnt/buildkit; STORAGE_ARGS="-v /mnt/buildkit:/var/lib/buildkit"; } || STORAGE_ARGS=""
          docker run -d --name buildkitd --privileged --network host ${STORAGE_ARGS} moby/buildkit:buildx-stable-1 --addr tcp://0.0.0.0:1234 --allow-insecure-entitlement security.insecure --allow-insecure-entitlement network.host
          docker buildx create --name builder --driver remote tcp://127.0.0.1:1234 --use
          docker buildx inspect --bootstrap

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare build variables
        run: |
          PRODUCT_VERSION=$(echo "${{ matrix.branch }}" | sed '/^release\b\|^hotfix\b\|^feature\b\|^bugfix\b/s/release.*\/\|hotfix.*\/\|feature.*\/\|bugfix.*\///; s/-git-action$//; s/^v//')
          [ "${PRODUCT_VERSION}" = "develop" ] && PRODUCT_VERSION="develop"
          echo "DOCKER_TAG=${PRODUCT_VERSION}.${{ github.run_number }}" >> $GITHUB_ENV
          echo "PRODUCT_VERSION=${PRODUCT_VERSION}" >> $GITHUB_ENV
        shell: bash

      - name: Build ${{ matrix.service }}
        timeout-minutes: 90
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd .${DOCKER_PATH}
          docker buildx bake -f build.hcl ${{ matrix.service }}-services \
            --set "*.args.GIT_BRANCH=${{ matrix.branch }}" \
            --set "*.args.PRODUCT_VERSION=${{ env.PRODUCT_VERSION }}" \
            --set "*.args.BUILD_NUMBER=${{ github.run_number }}" \
            --set "*.platform=linux/amd64,linux/arm64" \
            --set "*.secrets=id=github_token,env=GITHUB_TOKEN" \
            --sbom=true --provenance=mode=max --push
          
          # Clean up disk space after build
          printf '%.0s=' {1..80}; echo -e "\nDISK SPACE AFTER BUILD $(echo ${{ matrix.service }} | tr '[:lower:]' '[:upper:]')"; df -h; docker system df; printf '%.0s=' {1..80}; echo
          docker buildx prune -a -f; docker system prune -a -f --volumes

  trigger-oci-docker:
    name: OCI (${{ matrix.branch }})
    needs: build
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    continue-on-error: true
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: ${{ github.event.client_payload.branches || fromJson(inputs.branches) }}
    steps:
      - name: Checkout ${{ matrix.branch }}
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.branch }}

      - name: Process branch ${{ matrix.branch }}
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME_PAT }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN_PAT }}
        run: |
          PRODUCT_VERSION=$(echo "${{ matrix.branch }}" | sed '/^release\b\|^hotfix\b\|^feature\b\|^bugfix\b/s/release.*\/\|hotfix.*\/\|feature.*\/\|bugfix.*\///; s/-git-action$//; s/^v//')
          DOCKER_TAG="${PRODUCT_VERSION}.${{ github.run_number }}"

          sudo GITHUB_REPOSITORY=${{ github.repository }} BRANCH=${{ matrix.branch }} \
            DOCKER_REPOSITORY=${{ env.REPO }} DOCKER_PREFIX=${{ env.DOCKER_IMAGE_PREFIX }} DOCKER_TAG=$DOCKER_TAG \
            DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME} DOCKERHUB_TOKEN=${DOCKERHUB_TOKEN} \
            bash .github/scripts/docker-images-availability.sh

          gh workflow run "ci-oci-docker-install.yml" --repo "${{ github.repository }}" --ref "${{ matrix.branch }}" --field offline=false --field testing=true --field tag=$DOCKER_TAG
