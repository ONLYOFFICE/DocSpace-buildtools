name: OCI Packages Update

on:
  schedule:
    - cron: '00 20 * * 0'

  workflow_dispatch:
    inputs:
      centos9s:
         type: boolean
         description: 'CentOS 9S'
         default: true
      centos10:
         type: boolean
         description: 'CentOS 10S'
         default: true
      debian11:
         type: boolean
         description: 'Debian 11'
         default: true
      debian12:
         type: boolean
         description: 'Debian 12'
         default: true
      debian13:
         type: boolean
         description: 'Debian 13'
         default: true
      ubuntu2204:
         type: boolean
         description: 'Ubuntu 22.04'
         default: true
      ubuntu2404:
         type: boolean
         description: 'Ubuntu 24.04'
         default: true
      ubuntu2604:
         type: boolean
         description: 'Ubuntu 26.04'
         default: true

jobs:
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:

      - name: Set matrix names
        id: set-matrix
        run: |
          matrix=$(echo '{
            "include": [
              {"execute": '${{ github.event.inputs.centos9s   || true }}', "name": "CentOS 9S",    "os": "centos9s",   "distr": "onlyoffice"},
              {"execute": '${{ github.event.inputs.centos10   || true }}', "name": "CentOS 10S",   "os": "centos10",   "distr": "onlyoffice"},
              {"execute": '${{ github.event.inputs.debian11   || true }}', "name": "Debian 11",    "os": "debian11",   "distr": "onlyoffice"},
              {"execute": '${{ github.event.inputs.debian12   || true }}', "name": "Debian 12",    "os": "debian12",   "distr": "onlyoffice"},
              {"execute": '${{ github.event.inputs.debian13   || true }}', "name": "Debian 13",    "os": "debian13",   "distr": "onlyoffice"},
              {"execute": '${{ github.event.inputs.ubuntu2204 || true }}', "name": "Ubuntu 22.04", "os": "ubuntu2204", "distr": "onlyoffice"},
              {"execute": '${{ github.event.inputs.ubuntu2404 || true }}', "name": "Ubuntu 24.04", "os": "ubuntu2404", "distr": "onlyoffice"},
              {"execute": '${{ github.event.inputs.ubuntu2604 || true }}', "name": "Ubuntu 26.04", "os": "ubuntu2604", "distr": "onlyoffice"}
            ]
          }' | jq -c '{include: [.include[] | select(.execute == true)]}')
          echo "matrix=${matrix}" >> $GITHUB_OUTPUT

  update-boxes:
    name: "${{ matrix.name }}"
    runs-on: ubuntu-22.04
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{fromJSON(needs.prepare.outputs.matrix)}}

    steps:
      - name: Free Disk Space
        run: |
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/${{ github.ref_name }}/.github/scripts/free-disk-space-linux.sh | sudo VBOX_SAFE=1 bash

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install tools
        run: |
          set -eux
          # Setup VirtualBox repository
          curl -fsSL https://www.virtualbox.org/download/oracle_vbox_2016.asc | sudo gpg --dearmor -o /usr/share/keyrings/virtualbox.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/virtualbox.gpg] https://download.virtualbox.org/virtualbox/debian $(lsb_release -cs) contrib" | sudo tee /etc/apt/sources.list.d/virtualbox.list

          # Setup Vagrant repository
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/hashicorp.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list

          # Install tools
          sudo apt-get update -y
          sudo apt-get install -y vagrant shellcheck

          # Install specific VirtualBox version
          curl -fsSL "https://download.virtualbox.org/virtualbox/7.1.12/virtualbox-7.1_7.1.12-169651~Ubuntu~jammy_amd64.deb" -o /tmp/vbox.deb
          sudo apt-get install -y /tmp/vbox.deb

      - name: "Update on ${{matrix.name}}"
        env:
          TEST_CASE: --local-install
          DISTR: ${{ matrix.distr }}
          OS: docspace-${{ matrix.os }}
          RAM: 8192
          CPU: 3
          DOWNLOAD_SCRIPT: '-ds false'
          TEST_REPO: "${{ github.ref_name == 'master' && '-tr false' || '-tr true' }}"
          ARGUMENTS: "-arg '--skiphardwarecheck true --makeswap false --localscripts true --update true'"
        run: |
          set -eux
          cd tests/vagrant
          vagrant up --provider=virtualbox

      - name: "Health check for ${{matrix.name}}"
        run: |
          cd tests/vagrant
          if vagrant status | grep -q "running"; then
            vagrant ssh -c "sudo bash /vagrant/post-install.sh healthcheck" || true
          else
            echo "VM is not running, skipping health check"
          fi

      - name: "Collect logs for ${{matrix.name}}"
        if: always()
        run: |
          cd tests/vagrant
          if vagrant status | grep -q "running"; then
            vagrant ssh -c "sudo bash /vagrant/post-install.sh logs" || true
          else
            echo "VM is not running, skipping log collection"
          fi

      - name: Cleanup
        if: always()
        run: |
          cd tests/vagrant || exit 0
          vagrant destroy --force || true
          vagrant global-status --prune || true
