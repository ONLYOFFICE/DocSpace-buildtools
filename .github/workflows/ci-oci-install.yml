name: OCI Packages

on:
  schedule:
    - cron: "00 20 * * 0"

  workflow_dispatch:
    inputs:
      distros:
        type: string
        description: Select distros (only without deb/rpm flags)
        default: |
          debian11,
          debian12,
          debian13,
          ubuntu2204,
          ubuntu2404,
          ubuntu2604,
          rhel9,
          centos9S,
          centos10S,
          fedora42,
          fedora43
      deb_build:
        type: boolean
        description: "Override: All DEB-based distros"
        default: false
      rpm_build:
        type: boolean
        description: "Override: All RPM-based distros"  
        default: false
      testing:
        type: boolean
        description: "Use 4testing packages"
        default: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix names
        id: set-matrix
        env:
          OS_ORDER: rhel9 centos9S centos10S fedora42 fedora43 debian11 debian12 debian13 ubuntu2204 ubuntu2404 ubuntu2604
          OS_MAP: |
            {
              "rhel9":      ["RHEL 9",       "generic",    "rhel9"],
              "centos9S":   ["CentOS 9S",    "onlyoffice", "base-centos9s"],
              "centos10S":  ["CentOS 10S",   "onlyoffice", "base-centos10"],
              "fedora42":   ["Fedora 42",    "onlyoffice", "base-fedora42"],
              "fedora43":   ["Fedora 43",    "brigada",    "fedora-43"],
              "debian11":   ["Debian 11",    "onlyoffice", "base-debian11"],
              "debian12":   ["Debian 12",    "onlyoffice", "base-debian12"],
              "debian13":   ["Debian 13",    "onlyoffice", "base-debian13"],
              "ubuntu2204": ["Ubuntu 22.04", "onlyoffice", "base-ubuntu2204"],
              "ubuntu2404": ["Ubuntu 24.04", "onlyoffice", "base-ubuntu2404"],
              "ubuntu2604": ["Ubuntu 26.04", "onlyoffice", "base-ubuntu2604"]
            }
        run: |
          declare -A os_set

          # Handle individual distro selection
          if [[ "${{ github.event.inputs.deb_build }}" != "true" && "${{ github.event.inputs.rpm_build }}" != "true" ]]; then
            DISTROS_INPUT="${{ github.event.inputs.distros }}"
            for os in ${DISTROS_INPUT//,/ }; do
              os_trimmed="$(echo "$os" | xargs)"
              [[ -n "$os_trimmed" ]] && os_set["$os_trimmed"]=1
            done
          fi

          # Override: All DEB-based distros (Debian/Ubuntu)
          [[ "${{ github.event.inputs.deb_build }}" == "true" ]] && \
            for os in $(jq -r 'to_entries[] | select(.value[0] | test("Debian|Ubuntu")) | .key' <<< "$OS_MAP"); do os_set["$os"]=1; done

          # Override: All RPM-based distros (CentOS/Fedora/RHEL)
          [[ "${{ github.event.inputs.rpm_build }}" == "true" ]] && \
            for os in $(jq -r 'to_entries[] | select(.value[0] | test("CentOS|Fedora|RHEL")) | .key' <<< "$OS_MAP"); do os_set["$os"]=1; done

          # For scheduled runs, use all distros
          [[ "${{ github.event_name }}" == "schedule" ]] && \
            for os in $(jq -r 'keys[]' <<< "$OS_MAP"); do os_set["$os"]=1; done

          # Build matrix in defined order
          matrix=$(jq -c -n --argjson map "$OS_MAP" --arg order "$OS_ORDER" \
            --argjson list "$(printf '%s\n' "${!os_set[@]}" | jq -R . | jq -s .)" \
            '{include: [($order | split(" "))[] | select(. as $k | $list[] == $k) | {name: $map[.][0], os: ($map[.][2] // .), distr: $map[.][1]}]}')

          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  vagrant-up:
    name: "${{ matrix.name }}"
    runs-on: ubuntu-22.04
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{fromJSON(needs.prepare.outputs.matrix)}}

    steps:
      - name: Free Disk Space
        run: |
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/${{ github.ref_name }}/.github/scripts/free-disk-space-linux.sh | sudo VBOX_SAFE=1 bash

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install tools
        run: |
          set -eux
          # Setup VirtualBox repository
          curl -fsSL https://www.virtualbox.org/download/oracle_vbox_2016.asc | sudo gpg --dearmor -o /usr/share/keyrings/virtualbox.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/virtualbox.gpg] https://download.virtualbox.org/virtualbox/debian $(lsb_release -cs) contrib" | sudo tee /etc/apt/sources.list.d/virtualbox.list
          
          # Setup Vagrant repository
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/hashicorp.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          
          # Install tools
          sudo apt-get update -y
          sudo apt-get install -y vagrant shellcheck aria2

          # Install specific VirtualBox version
          curl -fsSL "https://download.virtualbox.org/virtualbox/7.1.12/virtualbox-7.1_7.1.12-169651~Ubuntu~jammy_amd64.deb" -o /tmp/vbox.deb
          sudo apt-get install -y /tmp/vbox.deb

      - name: Validate scripts
        run: |
          find install/OneClickInstall tests -type f -name "*.sh" ! -path "install/OneClickInstall/install-Docker.sh" \
            | xargs shellcheck --exclude="$(awk '!/^#|^$/ {print $1}' tests/lint/sc_ignore | paste -sd ",")" --severity=warning | tee sc_output || true
          awk '/\(warning\):/ {w++} /\(error\):/ {e++} END {if (w+e) printf "::warning ::ShellCheck: %d warnings, %d errors\n", w+0, e+0}' sc_output

      - name: "Boot VM for ${{matrix.name}}"
        id: boot
        continue-on-error: true
        timeout-minutes: 45
        env:
          DISTR: ${{ matrix.distr }}
          OS: ${{ matrix.os }}
          RAM: 8192
          CPU: 3
        run: |
          set -eux
          cd tests/vagrant

          # retrying a boot on this same runner can't help if its L0 hypervisor never exposed (nested) VT-x/AMD-V at all — fail fast instead of burning 40 minutes
          if ! grep -qE 'vmx|svm' /proc/cpuinfo || ! VBoxManage list hostinfo | grep -qi 'nested HW virtualization:\s*yes'; then
            echo "::error::This runner host doesn't expose (nested) hardware virtualization to VirtualBox — re-run the job for a different host"
            exit 1
          fi

          # Prefetch the box with multi-connection aria2 — vagrant's own downloader is single-stream (falls back to it below if aria2 fails, e.g. a CDN rate-limit near completion on large boxes)
          box_name="${DISTR}/${OS}"
          box_url=$(curl -fsSL "https://vagrantcloud.com/api/v2/vagrant/${box_name}" \
            | jq -r '[.versions[0].providers[] | select(.name == "virtualbox" and (.architecture // "amd64") == "amd64")][0].url // empty' || true)
          if [ -n "$box_url" ]; then
            aria2_opts=(-x16 -s16 -k4M --max-tries=5 --retry-wait=3 --file-allocation=none --console-log-level=warn --summary-interval=30 -d /tmp -o vagrant.box)
            # a failure typically happens near completion — resume with -c instead of restarting from scratch
            (aria2c "${aria2_opts[@]}" "$box_url" || aria2c -c "${aria2_opts[@]}" "$box_url") \
              && vagrant box add --name "${box_name}" /tmp/vagrant.box \
              || echo "Box prefetch failed, vagrant will download it itself"
            rm -f /tmp/vagrant.box /tmp/vagrant.box.aria2
          fi

          # VM boot on shared runners is flaky — destroy and retry once on failure or hang
          timeout --kill-after=60s 20m vagrant up --no-provision --provider=virtualbox || {
            echo "VM boot failed or timed out after 20 minutes, retrying..."
            echo "--- host diagnostics ---"
            VBoxManage list hostinfo || true
            dmesg 2>/dev/null | tail -50 || true
            pkill -TERM -f '[v]agrant|[r]uby.*vagrant' || true
            sleep 5
            pkill -KILL -f '[v]agrant|[r]uby.*vagrant' || true
            # a hung/timed-out VM can survive the killed vagrant/ruby wrapper and keep the forwarded port bound
            for vm_id in $(VBoxManage list runningvms 2>/dev/null | awk -F'"' '{print $2}'); do
              VBoxManage controlvm "$vm_id" poweroff 2>/dev/null || true
            done
            vagrant destroy --force || true
            timeout --kill-after=60s 20m vagrant up --no-provision --provider=virtualbox
          }

      - name: Warn about VM boot failure
        if: steps.boot.outcome == 'failure'
        run: echo "::warning::VM boot failed on ${{ matrix.name }} — runner infrastructure flake, install test skipped"

      - name: "Install on ${{matrix.name}}"
        if: steps.boot.outcome == 'success'
        timeout-minutes: 55
        env:
          DISTR: ${{ matrix.distr }}
          OS: ${{ matrix.os }}
          RAM: 8192
          CPU: 3
          USE_4TESTING: ${{ github.event.inputs.testing }}
        run: |
          set -eux
          cd tests/vagrant

          # Configure parameters based on 4testing mode
          if [[ "$USE_4TESTING" == "true" ]]; then
            export DOWNLOAD_SCRIPT='-ds false'
            export TEST_REPO='-tr true'
            export ARGUMENTS="-arg '--skiphardwarecheck true --localscripts true'"
            echo -e "\e[33mUsing 4testing packages\e[0m"
          else
            export DOWNLOAD_SCRIPT='-ds true'
            export TEST_REPO='-tr false'
            export ARGUMENTS="-arg '--skiphardwarecheck true'"
            echo -e "\e[32mUsing production packages\e[0m"
          fi

          vagrant provision

      - name: "Health check for ${{matrix.name}}"
        if: steps.boot.outcome == 'success'
        run: |
          cd tests/vagrant
          if vagrant status | grep -q "running"; then
            vagrant ssh -c "sudo bash /vagrant/post-install.sh healthcheck" || true
          else
            echo "VM is not running, skipping health check"
          fi

      - name: "Smoke test on ${{matrix.name}}"
        if: steps.boot.outcome == 'success'
        timeout-minutes: 20
        env:
          LICENSE: ${{ secrets.LICENSE_ENTERPRISE }}
        run: bash tests/vagrant/smoke-test.sh

      - name: "Uninstall on ${{matrix.name}}"
        if: steps.boot.outcome == 'success'
        timeout-minutes: 10
        run: |
          cd tests/vagrant
          if vagrant status | grep -q "running"; then
            vagrant ssh -c "sudo bash /vagrant/post-install.sh uninstall"
          else
            echo "VM is not running, cannot run uninstall test"
            exit 1
          fi

      - name: "Collect logs for ${{matrix.name}}"
        if: always()
        run: |
          cd tests/vagrant
          if vagrant status | grep -q "running"; then
            vagrant ssh -c "sudo bash /vagrant/post-install.sh logs" || true
          else
            echo "VM is not running, skipping log collection"
          fi

      - name: Cleanup
        if: always()
        run: |
          cd tests/vagrant || exit 0
          vagrant destroy --force || true
          vagrant global-status --prune || true
