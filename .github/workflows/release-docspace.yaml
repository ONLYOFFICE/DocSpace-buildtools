name: Release Docker Images

run-name: "Release Docker Images [${{ github.event.inputs.release_version }}]${{ github.event.inputs.services_filter != '' && ' (partial release)' || '' }}"

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'hub.docker repo owner (ex. onlyoffice)'
        type: string
        required: true
        default: 'onlyoffice'
      release_version:
        type: string
        description: 'Tag for stable release (ex. 2.5.1.1)'
        required: true
      source_version:
        type: string
        description: '4testing source tag (ex. 2.5.1.2678)'
        required: true
      services_filter:
        type: string
        description: 'Targets to release (ex. onlyoffice-community onlyoffice-api). Empty = all.'
        required: false
        default: ''
      trigger_offline_release:
        type: boolean
        description: 'Trigger offline release'
        required: false
        default: true

jobs:
  docker-release:
    name: "Release Docker DocSpace"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        repository: 'ONLYOFFICE/DocSpace-buildtools'

    - name: Login to DockerHub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: "Release Docker-DocSpace"
      shell: bash
      env:
        REPO: ${{ github.event.inputs.repo }}
        DOCKER_TAG: ${{ github.event.inputs.source_version }}
        RELEASE_VERSION: ${{ github.event.inputs.release_version }}
        DOCKER_IMAGE_PREFIX: "4testing-docspace"
        DOCKER_USERNAME_PAT: ${{ secrets.DOCKERHUB_USERNAME_PAT }}
        DOCKER_TOKEN_PAT: ${{ secrets.DOCKERHUB_TOKEN_PAT }}
        SERVICES_FILTER: ${{ github.event.inputs.services_filter }}
      run: |
        chmod +x ${GITHUB_WORKSPACE}/.github/scripts/release-docspace.sh
        ${GITHUB_WORKSPACE}/.github/scripts/release-docspace.sh

  trigger-offline-release:
    needs: docker-release
    if: ${{ needs.docker-release.result == 'success' && github.event.inputs.trigger_offline_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Docker Hub tag to appear
        shell: bash
        env:
          DOCKER_TAG: ${{ github.event.inputs.release_version }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME_PAT }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN_PAT }}
        run: |
          echo "Waiting for images with tag ${{ env.DOCKER_TAG }} to appear on Docker Hub..."
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/${{ github.ref_name }}/.github/scripts/docker-images-availability.sh \
            | sudo GITHUB_REPOSITORY=${{ github.repository }} BRANCH=${{ github.ref_name }} DOCKER_REPOSITORY=${{ github.event.inputs.repo }} DOCKER_PREFIX=docspace DOCKER_TAG=${{ env.DOCKER_TAG }} DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME} DOCKERHUB_TOKEN=${DOCKERHUB_TOKEN} bash

      - name: Trigger offline release
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          gh workflow run "offline-release.yml" --repo "${{ github.repository }}" --ref "${{ github.ref_name }}" --field trigger=true
