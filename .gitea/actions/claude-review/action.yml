name: Claude Code Review
description: Runs Claude AI code review on a pull request

inputs:
  anthropic_api_key:
    required: true
  gitea_token:
    required: true
  model:
    required: false
    default: claude-sonnet-4-6

runs:
  using: composite
  steps:
    - name: Claude Code Review
      uses: markwylde/claude-code-gitea-action@92631f4d12a7f117d0318802d6350f24c7b24c27
      with:
        anthropic_api_key: ${{ inputs.anthropic_api_key }}
        gitea_token: ${{ inputs.gitea_token }}
        model: ${{ inputs.model }}
        direct_prompt: |
          Read CLAUDE.md from the repository root to understand the repository context (tech stack, project structure, review focus, coding standards).
          Then review this pull request following ALL instructions below precisely.

          **Environment**: Gitea Actions (not GitHub), standard git operations, some GitHub Actions features may differ

          ## Review Workflow

          **Context**: Also read README.md to understand project architecture before reviewing.

          ### 1. Get the full PR diff

          Use the PR diff already available in context.
          Only if it appears to cover just the latest commit (e.g., previous review exists with issues not present in current diff), run `git diff origin/<base_branch>...HEAD` to get the full diff across all commits.

          ### 2. Check Previous Reviews

          - Search PR comments for one containing `<!-- claude-review-bot -->`
          - If found: for each issue check if it is **still present in the full PR diff**
            - Fixed → replace its `<details>` block with a ⚪️ Fixed entry (preserving original severity)
            - Not fixed → keep it as-is
          - Find new issues in the full PR diff that are not already in the previous review
          - **PR Summary and Positive Observations** must also reflect the full PR diff, not just the latest commit

          ### 3. Output Format

          Respond with exactly this structure:

          <!-- claude-review-bot -->

          <details>
          <summary>[VERDICT] - Claude Code Review</summary>

            > 🔴 **X** Critical · 🟡 **X** Medium · 🔵 **X** Low · ✅ **X** Positive · ⚪️ **X** Fixed

          ---

          ### 📋 PR Summary
          - **What**: Brief description of the main changes.
          - **Why**: Reason or motivation for the changes.
          - **Scope**: Which files, components, directories are affected.
          - **Details** (optional):
            - If the changes affect project structure, list new, deleted, or moved files/directories.
            - If there are important technical decisions, briefly describe them.
            - If there are breaking changes, state them explicitly.

          ---

          ### 🔒 Security Issues *(omit if no open issues and no fixed items)*
            <details><summary>⚪️ Fixed [🔴/🟡/🔵]: [title]</summary>

            - **Was**: original severity description
            - **Fix applied**: what exactly was changed and where (`path/file.ext:line`)

            </details> *(only if a previous Security issue was fixed)*
            <details><summary>[🔴 Critical/🟡 Medium/🔵 Low]: Issue Title</summary>

            - **File**: `path/file.ext:42`
            - **Why**: Problem explanation
            - **Fix**: Solution with code example

            </details>

          ---

          ### 🐛 Code Quality *(omit if no open issues and no fixed items)*
            *(same structure as Security)*

          ---

          ### 🎨 Style *(omit if no open issues and no fixed items)*
            *(same structure as Security)*

          ---

          ### ✅ Positive Observations *(omit block if none)*
          - **Feature**: Description

          ---

          ### 📝 Documentation Updates Required *(omit block if nothing to update)*
          - **README.md**: [what and why]
          - **CLAUDE.md**: [what and why]

          ---

          </details>

          ### 4. Verdict Logic

          Set [VERDICT] based only on **currently open** issues (⚪️ Fixed entries do NOT count):
          - `✅ APPROVE` — no open 🔴 Critical or 🟡 Medium issues (only 🔵 Low / ✅ Positive / ⚪️ Fixed)
          - `❌ BLOCKED` — at least one open 🔴 Critical or 🟡 Medium issue

          ### 5. Formatting Rules

          - Severity in `<summary>`: exactly one of `🔴 Critical` · `🟡 Medium` · `🔵 Low`
          - **Omit rule**: omit entire block (header + content + trailing `---`) when the block condition is met; repeat issue/fixed entries as needed within a block
          - Always include file:line, impact, actionable fix; add before/after code examples where helpful
          - **Issue counter**: replace each `X` with actual count (`0` if none); Fixed = total ⚪️ Fixed across all categories
          - **Strict format**: output ONLY the structure above — do not add any extra lines, summaries, or sections outside the template

    - name: Replace previous review with new one
      shell: bash
      env:
        GITEA_TOKEN: ${{ inputs.gitea_token }}
        GITEA_URL: ${{ github.server_url }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        # Fetch all comments with pagination
        ALL_COMMENTS="[]"
        PAGE=1
        while true; do
          BATCH=$(curl -sf \
            -H "Authorization: token $GITEA_TOKEN" \
            "$GITEA_URL/api/v1/repos/$REPO/issues/$PR_NUMBER/comments?limit=50&page=$PAGE") || break
          BATCH_COUNT=$(echo "$BATCH" | jq 'length')
          [ "$BATCH_COUNT" -eq 0 ] && break
          ALL_COMMENTS=$(jq -n --argjson a "$ALL_COMMENTS" --argjson b "$BATCH" '$a + $b')
          [ "$BATCH_COUNT" -lt 50 ] && break
          PAGE=$((PAGE + 1))
        done

        MARKED=$(echo "$ALL_COMMENTS" | jq '[.[] | select(.body | contains("<!-- claude-review-bot -->"))] | sort_by(.id)')
        COUNT=$(echo "$MARKED" | jq 'length')

        # Need at least 2: one old + one new just created by Claude
        if [ "$COUNT" -lt 2 ]; then
          echo "Only $COUNT review comment(s) found, nothing to merge"
          exit 0
        fi

        OLD_ID=$(echo "$MARKED" | jq -r 'first | .id')
        NEW_BODY=$(echo "$MARKED" | jq -r 'last | .body')

        # Patch the oldest comment with the new content
        curl -sf -X PATCH \
          -H "Authorization: token $GITEA_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"body\": $(echo "$NEW_BODY" | jq -Rs .)}" \
          "$GITEA_URL/api/v1/repos/$REPO/issues/comments/$OLD_ID"

        # Delete all other review comments (all except the oldest)
        echo "$MARKED" | jq -r '.[1:] | .[].id' | while read -r DEL_ID; do
          curl -sf -X DELETE \
            -H "Authorization: token $GITEA_TOKEN" \
            "$GITEA_URL/api/v1/repos/$REPO/issues/comments/$DEL_ID" || true
        done
