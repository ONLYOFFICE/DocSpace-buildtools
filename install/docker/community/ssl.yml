services:
  onlyoffice-docspace:
    ports:
      - "443:443"
    environment:
      SSL_MODE: ${SSL_MODE}
      SSL_DOMAIN: ${SSL_DOMAIN}
      SSL_CERT_PATH: ${SSL_CERT_PATH}
      SSL_KEY_PATH: ${SSL_KEY_PATH}
      SSL_EMAIL: ${SSL_EMAIL}
      LETSENCRYPT_STAGING: ${LETSENCRYPT_STAGING:-false}
      LETSENCRYPT_FORCE_RENEW: ${LETSENCRYPT_FORCE_RENEW:-false}
      LETSENCRYPT_FAIL_OPEN: ${LETSENCRYPT_FAIL_OPEN:-false}
    volumes:
      # Must be read-write because the app entrypoint runs certbot.
      - ./config/nginx/ssl/letsencrypt:/etc/letsencrypt
      - ./config/nginx/certs:/etc/nginx/certs:ro
      - certbot:/var/www/certbot

volumes:
  certbot:

