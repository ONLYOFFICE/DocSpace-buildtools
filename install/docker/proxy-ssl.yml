x-healthcheck:
  &x-healthcheck
  test: curl --fail http://127.0.0.1 || exit 1
  interval: 60s
  retries: 5
  start_period: 20s
  timeout: 10s

services:
  onlyoffice-proxy:
    image: ${REGISTRY}${PROXY_IMAGE_NAME}
    container_name: ${PROXY_HOST}
    restart: always
    healthcheck:
     <<: *x-healthcheck
     test: nginx -t || exit 1
    extra_hosts:
      - "${EXTRA_HOSTS:-placeholder.local:127.0.0.1}"
    ports:
      - ${EXTERNAL_PORT}:80
      - ${EXTERNAL_PORT_HTTPS}:443/tcp
      - ${EXTERNAL_PORT_HTTPS}:443/udp
    environment:
      - ROUTER_HOST=${ROUTER_HOST}
    volumes:
      - ${VOLUMES_DIR:+${VOLUMES_DIR}/}log_data:/var/log/nginx
      - ./config/nginx/nginx.conf.template:/etc/nginx/nginx.conf
      - ./config/nginx/proxy/letsencrypt.conf:/etc/nginx/includes/letsencrypt.conf
      - ./config/nginx/proxy/onlyoffice-proxy-ssl.conf:/etc/nginx/conf.d/default.conf
      - ./config/nginx/proxy/templates/proxy.upstream.conf.template:/etc/nginx/templates/proxy.upstream.conf.template:ro
      - ${CERTIFICATE_PATH}:/usr/local/share/ca-certificates/tls.crt
      - ${CERTIFICATE_KEY_PATH}:/etc/ssl/private/tls.key
      - ${DHPARAM_PATH}:/etc/ssl/certs/dhparam.pem
      - webroot_path:/letsencrypt

networks:
  default:
    name: ${NETWORK_NAME}
    external: true

volumes:
  log_data:
  webroot_path:
