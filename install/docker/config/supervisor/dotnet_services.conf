[supervisord]
nodaemon=true
logfile=%(ENV_LOG_DIR)s/supervisord_dotnet.log
loglevel=warn

[program:ASC.Migration.Runner]
command=dotnet ASC.Migration.Runner.dll standalone=true
directory=%(ENV_BUILD_PATH)s/services/ASC.Migration.Runner/service
autostart=true
autorestart=false
startsecs=0
priority=1
stdout_logfile=%(ENV_LOG_DIR)s/ASC.Migration.Runner.log
stdout_logfile_maxbytes=0
stderr_logfile=%(ENV_LOG_DIR)s/ASC.Migration.Runner.log
stderr_logfile_maxbytes=0

[eventlistener:start-after-migration]
command=python3 /usr/local/bin/start-after-migration.py
events=PROCESS_STATE_EXITED
autostart=true
autorestart=false
stderr_logfile=%(ENV_LOG_DIR)s/ASC.Migration.Runner.log
stderr_logfile_maxbytes=0

[program:ASC.AI]
command=dotnet ASC.AI.dll --urls=http://0.0.0.0:%(ENV_SERVICE_AI_PORT)s --'$STORAGE_ROOT'=%(ENV_APP_STORAGE_ROOT)s --ENVIRONMENT=%(ENV_INSTALLATION_TYPE)s --pathToConf=%(ENV_PATH_TO_CONF)s --log:dir=%(ENV_LOG_DIR)s --log:name=ASC.AI core:products:folder=%(ENV_BUILD_PATH)s/products/ core:products:subfolder=server
directory=%(ENV_BUILD_PATH)s/products/ASC.AI/server
autostart=false
autorestart=true
startsecs=25

[program:ASC.AI.Worker]
command=dotnet ASC.AI.Worker.dll --urls=http://0.0.0.0:%(ENV_SERVICE_AI_WORKER_PORT)s --'$STORAGE_ROOT'=%(ENV_APP_STORAGE_ROOT)s --ENVIRONMENT=%(ENV_INSTALLATION_TYPE)s --pathToConf=%(ENV_PATH_TO_CONF)s --log:dir=%(ENV_LOG_DIR)s --log:name=ASC.AI.Worker core:products:folder=%(ENV_BUILD_PATH)s/products/ core:products:subfolder=server --core:eventBus:subscriptionClientName=asc_event_bus_ai_service_queue
directory=%(ENV_BUILD_PATH)s/products/ASC.AI/service
autostart=false
autorestart=true
startsecs=25

