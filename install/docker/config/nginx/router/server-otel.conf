# OpenTelemetry access-log correlation (docker router image only).
# Trace/span ids are populated by /etc/nginx/lua/otel/rewrite.lua; when tracing
# is disabled $otel_log stays 0 and nothing is written to the json log.
set $otel_trace_id "";
set $otel_span_id "";
set $otel_log 0;

# an access_log directive here overrides the inherited http-level one,
# so the default file log is repeated to keep it in place
access_log /var/log/nginx/access.log main;
access_log /dev/stdout otel_json if=$otel_log;
