# OpenTelemetry tracing for the router (docker image only, see
# buildtools/config/nginx/lua/otel). Copied to /etc/nginx/conf.d/00-otel.conf
# so it is parsed before onlyoffice.conf, which references log_format otel_json
# via /etc/nginx/includes/server-otel.conf.
lua_package_path "/etc/nginx/lua/?.lua;/usr/local/openresty/luajit/share/lua/5.1/?.lua;;";
lua_package_cpath "/usr/local/openresty/luajit/lib/lua/5.1/?.so;;";

init_worker_by_lua_file /etc/nginx/lua/otel/init.lua;
rewrite_by_lua_file /etc/nginx/lua/otel/rewrite.lua;
log_by_lua_file /etc/nginx/lua/otel/log.lua;

log_format otel_json escape=json '{"time":"$time_iso8601","remote_addr":"$remote_addr",'
                                 '"method":"$request_method","uri":"$request_uri","status":$status,'
                                 '"body_bytes_sent":$body_bytes_sent,"request_time":$request_time,'
                                 '"referer":"$http_referer","user_agent":"$http_user_agent",'
                                 '"x_forwarded_for":"$http_x_forwarded_for",'
                                 '"trace_id":"$otel_trace_id","span_id":"$otel_span_id"}';
